<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>悦美 · 价格查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rose: #E8A0B0;
            --rose-deep: #C97A90;
            --rose-light: #FDF0F3;
            --rose-mid: #F5D5DC;
            --gold: #C9A96E;
            --gold-light: #F7F0E6;
            --text: #1A1020;
            --text-sub: #9A8A8E;
            --border: #EDE0E3;
            --bg: #FBF7F8;
            --card: #FFFFFF;
            --up: #D4756A;
            --down: #5A9E78;
            --sidebar-w: 88px;
            --header-h: 68px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ══ 全局动画 ══ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(201, 122, 144, 0.4);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(201, 122, 144, 0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-18px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes rowIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes floatBadge {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        /* ══ HEADER ══ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: linear-gradient(135deg, #fff8fa 0%, #fff 70%);
            border-bottom: 1px solid var(--rose-mid);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 200;
            box-shadow: 0 2px 24px rgba(201, 122, 144, 0.10);
            animation: fadeIn 0.5s ease;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-emblem {
            width: 42px;
            height: 42px;
            background: linear-gradient(145deg, var(--rose-deep), var(--gold));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 16px rgba(201, 122, 144, 0.38);
            animation: pulse 2.8s infinite;
            flex-shrink: 0;
        }

        .logo-info {
            display: flex;
            flex-direction: column;
        }

        .logo-name {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--rose-deep) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .logo-sub {
            font-size: 10px;
            color: var(--text-sub);
            letter-spacing: 1.5px;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 微信按钮 */
        .wechat-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            background: #fff;
            border: 1.5px solid var(--rose-mid);
            border-radius: 24px;
            padding: 5px 13px 5px 6px;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            position: relative;
        }

        .wechat-btn:hover {
            border-color: var(--rose);
            box-shadow: 0 4px 14px rgba(201, 122, 144, 0.2);
            transform: translateY(-1px);
        }

        .wechat-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 1.5px solid var(--rose-mid);
        }

        .wechat-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .wechat-label {
            font-size: 9px;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        .wechat-id {
            font-size: 12px;
            font-weight: 700;
            color: var(--rose-deep);
            letter-spacing: 0.5px;
        }

        /* 微信悬浮二维码弹出 */
        .wechat-popup {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: #fff;
            border: 1px solid var(--rose-mid);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 8px 32px rgba(201, 122, 144, 0.18);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 300;
            animation: fadeInUp 0.2s ease;
            white-space: nowrap;
        }

        .wechat-btn:hover .wechat-popup {
            display: flex;
        }

        .wechat-popup img {
            width: 110px;
            height: 110px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--rose-mid);
        }

        .wechat-popup-text {
            font-size: 11px;
            color: var(--text-sub);
            text-align: center;
        }

        .wechat-popup-id {
            font-size: 13px;
            font-weight: 700;
            color: var(--rose-deep);
        }

        .change-btn {
            font-size: 12px;
            font-weight: 700;
            color: var(--rose-deep);
            background: var(--rose-light);
            border: 1.5px solid var(--rose-mid);
            padding: 7px 15px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .change-btn:hover {
            background: var(--rose-mid);
            transform: translateY(-1px);
        }

        .change-btn.active {
            background: linear-gradient(135deg, var(--rose-deep), var(--gold));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(201, 122, 144, 0.42);
        }

        /* ══ LAYOUT ══ */
        .layout {
            display: flex;
            padding-top: var(--header-h);
            height: 100vh;
            overflow: hidden;
        }

        /* ══ SIDEBAR ══ */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 7px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scrollbar-width: none;
            animation: fadeIn 0.6s ease;
        }

        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar-title {
            font-size: 9px;
            letter-spacing: 2.5px;
            color: var(--text-sub);
            text-align: center;
            padding: 4px 0 10px;
            text-transform: uppercase;
        }

        .cat-btn {
            width: 100%;
            padding: 9px 4px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-sub);
            font-size: 11.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.22s;
            text-align: center;
            line-height: 1.4;
            word-break: break-all;
            animation: slideInLeft 0.4s ease both;
        }

        .cat-btn:hover {
            background: var(--rose-light);
            color: var(--rose-deep);
            transform: translateX(2px);
        }

        .cat-btn.active {
            background: linear-gradient(135deg, var(--rose-deep), var(--gold));
            color: #fff;
            font-weight: 800;
            box-shadow: 0 4px 14px rgba(201, 122, 144, 0.32);
            animation: floatBadge 2s infinite;
        }

        .cat-count {
            display: block;
            font-size: 9px;
            margin-top: 2px;
            opacity: 0.8;
        }

        /* ══ MAIN ══ */
        .main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--rose-mid) transparent;
        }

        /* ══ SEARCH ══ */
        .search-wrap {
            position: relative;
            margin-bottom: 14px;
            animation: fadeInUp 0.5s ease 0.1s both;
        }

        .search-wrap svg {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--rose);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            background: #fff;
            color: var(--text);
            transition: all 0.25s;
            outline: none;
            box-shadow: 0 2px 12px rgba(201, 122, 144, 0.07);
            letter-spacing: 0.3px;
        }

        .search-input:focus {
            border-color: var(--rose);
            box-shadow: 0 0 0 4px rgba(232, 160, 176, 0.16);
        }

        .search-input::placeholder {
            color: #d0c0c5;
            font-weight: 400;
        }

        /* ══ STATS BAR ══ */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            padding: 0 4px;
            animation: fadeInUp 0.5s ease 0.2s both;
        }

        .stats-count {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
        }

        .stats-count strong {
            color: var(--rose-deep);
            font-weight: 800;
            font-size: 15px;
        }

        .stats-pills {
            display: flex;
            gap: 8px;
        }

        .pill {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .pill-up {
            background: #fdf0ee;
            color: var(--up);
        }

        .pill-down {
            background: #eef6f1;
            color: var(--down);
        }

        /* ══ CARD LIST (手机) ══ */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .price-card {
            background: var(--card);
            border-radius: 16px;
            padding: 15px 16px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.22s;
            box-shadow: 0 2px 10px rgba(201, 122, 144, 0.06);
            animation: fadeInUp 0.4s ease both;
        }

        .price-card:hover {
            border-color: var(--rose);
            box-shadow: 0 6px 20px rgba(201, 122, 144, 0.14);
            transform: translateY(-2px);
        }

        .price-card:active {
            transform: scale(0.982);
        }

        .price-card.is-up {
            border-left: 3px solid var(--up);
            background: linear-gradient(to right, #fff8f7, #fff);
        }

        .price-card.is-down {
            border-left: 3px solid var(--down);
            background: linear-gradient(to right, #f3faf6, #fff);
        }

        .card-left {
            flex: 1;
            min-width: 0;
        }

        .card-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
            letter-spacing: 0.4px;
        }

        .card-spec {
            font-size: 11px;
            color: var(--text-sub);
            background: var(--rose-light);
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .card-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .price-today {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .price-today.is-up {
            color: var(--up);
        }

        .price-today.is-down {
            color: var(--down);
        }

        .price-old {
            font-size: 11px;
            color: #ccc;
            text-decoration: line-through;
        }

        .price-tag {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .price-tag.is-up {
            background: #fdf0ee;
            color: var(--up);
        }

        .price-tag.is-down {
            background: #eef6f1;
            color: var(--down);
        }

        /* ══ TABLE (桌面) ══ */
        .table-wrap {
            display: none;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 28px rgba(201, 122, 144, 0.09);
            animation: fadeInUp 0.5s ease 0.15s both;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .data-table thead tr {
            background: linear-gradient(135deg, #d4889a 0%, #c9a96e 100%);
        }

        .data-table th {
            padding: 16px 20px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
        }

        .data-table th:nth-child(1) {
            width: 36%;
        }

        .data-table th:nth-child(2) {
            width: 24%;
        }

        .data-table th:nth-child(3) {
            width: 20%;
            text-align: right;
        }

        .data-table th:nth-child(4) {
            width: 20%;
            text-align: right;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: all 0.18s;
            animation: rowIn 0.35s ease both;
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table tbody tr:hover {
            background: var(--rose-light);
            transform: translateX(3px);
        }

        .data-table td {
            padding: 14px 20px;
            font-size: 14px;
            vertical-align: middle;
        }

        .data-table td:nth-child(3),
        .data-table td:nth-child(4) {
            text-align: right;
        }

        .td-name {
            font-weight: 700;
            color: var(--text);
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .td-spec {
            font-size: 11px;
            color: var(--text-sub);
            background: var(--rose-light);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .td-yp {
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
            text-decoration: line-through;
        }

        .td-tp {
            font-weight: 800;
            font-size: 15px;
            color: var(--text);
        }

        .td-tp.is-up {
            color: var(--up);
        }

        .td-tp.is-down {
            color: var(--down);
        }

        .arrow-tag {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 5px;
            margin-left: 5px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .arrow-tag.is-up {
            background: #fdf0ee;
            color: var(--up);
        }

        .arrow-tag.is-down {
            background: #eef6f1;
            color: var(--down);
        }

        /* ══ EMPTY ══ */
        .empty {
            text-align: center;
            padding: 70px 20px;
            color: var(--text-sub);
            animation: fadeIn 0.4s ease;
        }

        .empty-icon {
            font-size: 46px;
            margin-bottom: 12px;
        }

        .empty-text {
            font-size: 15px;
            font-weight: 500;
        }

        /* ══ SKELETON ══ */
        .skeleton-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .skeleton-card {
            background: var(--card);
            border-radius: 16px;
            padding: 15px 16px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sk {
            background: linear-gradient(90deg, #f5edef 25%, #fdf5f6 50%, #f5edef 75%);
            background-size: 200% 100%;
            border-radius: 8px;
            animation: shimmer 1.6s infinite;
        }

        .sk-t {
            width: 55%;
            height: 14px;
            margin-bottom: 8px;
        }

        .sk-s {
            width: 32%;
            height: 11px;
        }

        .sk-p {
            width: 68px;
            height: 22px;
        }

        /* ══ OVERLAY ══ */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(253, 240, 243, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            gap: 18px;
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 46px;
            height: 46px;
            border: 3px solid var(--rose-mid);
            border-top-color: var(--rose-deep);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }

        .overlay-logo {
            font-size: 36px;
            animation: floatBadge 2s infinite;
        }

        .overlay-text {
            font-size: 15px;
            color: var(--rose-deep);
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* ══ TOAST ══ */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text);
            color: #fff;
            padding: 11px 24px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            z-index: 999;
            transition: transform 0.3s ease;
            white-space: nowrap;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ══ RESPONSIVE ══ */
        @media (min-width: 768px) {
            :root {
                --sidebar-w: 100px;
                --header-h: 72px;
            }

            .card-list {
                display: none;
            }

            .table-wrap {
                display: block;
            }

            .main {
                padding: 22px 28px;
            }

            .logo-name {
                font-size: 19px;
            }
        }

        @media (min-width: 1200px) {
            :root {
                --sidebar-w: 112px;
            }

            .main {
                padding: 28px 40px;
            }
        }

        @media (max-width: 420px) {
            :root {
                --sidebar-w: 72px;
            }

            .cat-btn {
                font-size: 10px;
            }

            .logo-name {
                font-size: 14px;
                letter-spacing: 1.5px;
            }

            .wechat-info {
                display: none;
            }

            .wechat-btn {
                padding: 5px 8px;
            }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay">
        <div class="overlay-logo">🌸</div>
        <div class="spinner"></div>
        <div class="overlay-text">正在加载价格数据…</div>
    </div>

    <div class="toast" id="toast"></div>

    <header class="header">
        <div class="header-logo">
            <div class="logo-emblem">🌸</div>
            <div class="logo-info">
                <span class="logo-name">悦美价格查询</span>
                <span class="logo-sub">Medical Beauty · Price System</span>
            </div>
        </div>
        <div class="header-right">
            <div class="wechat-btn">
                <img class="wechat-avatar"
                    src="https://q7.itc.cn/images01/20241021/b28b46002ea144f6965bb9b48af63227.jpeg" alt="微信">
                <div class="wechat-info">
                    <span class="wechat-label">微信联系</span>
                    <span class="wechat-id">yueomei</span>
                </div>
                <div class="wechat-popup">
                    <img src="https://q7.itc.cn/images01/20241021/b28b46002ea144f6965bb9b48af63227.jpeg" alt="微信二维码">
                    <div class="wechat-popup-text">扫码 / 搜索微信号</div>
                    <div class="wechat-popup-id">yueomei</div>
                </div>
            </div>
            <button class="change-btn" id="changeBtn">今日变动</button>
        </div>
    </header>

    <div class="layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-title">分类</div>
        </nav>

        <main class="main" id="main">
            <div class="search-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input class="search-input" id="searchInput" type="text" placeholder="搜索品牌 / 型号 / 规格…">
            </div>

            <div class="stats-bar">
                <div class="stats-count">共 <strong id="countNum">0</strong> 条结果</div>
                <div class="stats-pills">
                    <span class="pill pill-up" id="statUp">↑ 0</span>
                    <span class="pill pill-down" id="statDown">↓ 0</span>
                </div>
            </div>

            <div class="card-list" id="cardList">
                <div class="skeleton-list" id="skeleton">
                    <div class="skeleton-card">
                        <div>
                            <div class="sk sk-t"></div>
                            <div class="sk sk-s"></div>
                        </div>
                        <div class="sk sk-p"></div>
                    </div>
                    <div class="skeleton-card">
                        <div>
                            <div class="sk sk-t"></div>
                            <div class="sk sk-s"></div>
                        </div>
                        <div class="sk sk-p"></div>
                    </div>
                    <div class="skeleton-card">
                        <div>
                            <div class="sk sk-t"></div>
                            <div class="sk sk-s"></div>
                        </div>
                        <div class="sk sk-p"></div>
                    </div>
                    <div class="skeleton-card">
                        <div>
                            <div class="sk sk-t"></div>
                            <div class="sk sk-s"></div>
                        </div>
                        <div class="sk sk-p"></div>
                    </div>
                    <div class="skeleton-card">
                        <div>
                            <div class="sk sk-t"></div>
                            <div class="sk sk-s"></div>
                        </div>
                        <div class="sk sk-p"></div>
                    </div>
                </div>
            </div>

            <div class="table-wrap" id="tableWrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>品牌 / 型号</th>
                            <th>规格</th>
                            <th>昨日价格</th>
                            <th>今日价格</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'https://console.saas.aiwa.top/customer_frontend/flows/v1/workflows/run';
        const API_TOKEN = 'Bearer app-fiUbGF7hjVh7wh9fQewnFL88';

        let allRows = [];
        let curCategory = 'all';
        let onlyChanged = false;
        let searchTerm = '';

        function parseJsonStr(s) {
            if (Array.isArray(s)) return s;
            if (typeof s === 'object' && s) return [s];
            if (typeof s !== 'string') return [];
            try {
                let p = JSON.parse(s.trim());
                if (typeof p === 'string') p = JSON.parse(p.trim());
                return Array.isArray(p) ? p : [p];
            } catch { return []; }
        }

        function parsePrice(v) {
            if (v == null) return 0;
            if (typeof v === 'number') return v;
            const m = String(v).replace(/,/g, '').match(/[\d.]+/);
            return m ? parseFloat(m[0]) : 0;
        }

        function clean(s) {
            return s ? String(s).replace(/\n/g, '').trim() : '';
        }

        function fmt(n) {
            return '¥' + Math.floor(n).toLocaleString('zh-CN');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2400);
        }

        async function fetchData() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': API_TOKEN, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ inputs: {}, response_mode: 'blocking', user: 'youdianmeiH5' })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const result = await res.json();
                const content = result?.data?.outputs?.content;
                let raw = [];
                if (Array.isArray(content)) {
                    content.forEach(c => raw.push(...parseJsonStr(c)));
                } else {
                    raw = parseJsonStr(content);
                }
                return raw;
            } catch {
                showToast('数据加载失败，请刷新重试');
                return [];
            }
        }

        async function init() {
            const raw = await fetchData();
            allRows = raw.map(item => ({
                brand: clean(item['品牌'] || ''),
                model: clean(item['型号'] || ''),
                spec: clean(item['规格'] || ''),
                category: clean(item['分类'] || ''),
                yp: parsePrice(item['昨日价格']),
                tp: parsePrice(item['今日价格']),
            }));
            buildSidebar();
            render();
            document.getElementById('overlay').style.display = 'none';
        }

        function buildSidebar() {
            const seen = new Set();
            const cats = [];
            allRows.forEach(r => {
                if (r.category && !seen.has(r.category)) { seen.add(r.category); cats.push(r.category); }
            });

            const all = [
                { id: 'all', name: '全部', count: allRows.length },
                ...cats.map(c => ({ id: c, name: c, count: allRows.filter(r => r.category === c).length }))
            ];

            const sidebar = document.getElementById('sidebar');
            const title = sidebar.querySelector('.sidebar-title');
            sidebar.innerHTML = '';
            sidebar.appendChild(title);

            all.forEach((c, i) => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn' + (c.id === 'all' ? ' active' : '');
                btn.dataset.id = c.id;
                btn.style.animationDelay = (i * 0.04) + 's';
                btn.innerHTML = `${c.name}<span class="cat-count">${c.count}</span>`;
                btn.addEventListener('click', () => {
                    sidebar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    curCategory = c.id;
                    render();
                    document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
                });
                sidebar.appendChild(btn);
            });
        }

        function getFiltered() {
            return allRows.filter(r => {
                if (curCategory !== 'all' && r.category !== curCategory) return false;
                if (onlyChanged && r.yp === r.tp) return false;
                if (searchTerm) {
                    const q = searchTerm.toLowerCase();
                    if (![r.brand, r.model, r.spec].some(s => s.toLowerCase().includes(q))) return false;
                }
                return true;
            });
        }

        function render() {
            const data = getFiltered();
            const upCnt = data.filter(r => r.tp > r.yp).length;
            const downCnt = data.filter(r => r.tp < r.yp).length;
            document.getElementById('countNum').textContent = data.length;
            document.getElementById('statUp').textContent = '↑ ' + upCnt;
            document.getElementById('statDown').textContent = '↓ ' + downCnt;
            renderCards(data);
            renderTable(data);
        }

        function renderCards(data) {
            const el = document.getElementById('cardList');
            const sk = document.getElementById('skeleton');
            if (sk) sk.remove();
            if (!data.length) {
                el.innerHTML = `<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">暂无相关数据</div></div>`;
                return;
            }
            el.innerHTML = data.map((r, i) => {
                const name = r.model ? `${r.brand}/${r.model}` : r.brand || '-';
                const diff = r.tp - r.yp;
                const cls = diff > 0 ? 'is-up' : diff < 0 ? 'is-down' : '';
                const tag = diff > 0 ? `<span class="price-tag is-up">涨</span>`
                    : diff < 0 ? `<span class="price-tag is-down">降</span>` : '';
                const old = diff !== 0 ? `<div class="price-old">${fmt(r.yp)}</div>` : '';
                return `
      <div class="price-card ${cls}" style="animation-delay:${i * 0.03}s">
        <div class="card-left">
          <div class="card-name">${name}</div>
          <span class="card-spec">${r.spec || '-'}</span>
        </div>
        <div class="card-right">
          <div class="price-today ${cls}">${fmt(r.tp)}</div>
          ${old}${tag}
        </div>
      </div>`;
            }).join('');
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data.length) {
                tbody.innerHTML = `<tr><td colspan="4"><div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">暂无相关数据</div></div></td></tr>`;
                return;
            }
            tbody.innerHTML = data.map((r, i) => {
                const name = r.model ? `${r.brand}/${r.model}` : r.brand || '-';
                const diff = r.tp - r.yp;
                const cls = diff > 0 ? 'is-up' : diff < 0 ? 'is-down' : '';
                const tag = diff > 0 ? `<span class="arrow-tag is-up">↑ 涨</span>`
                    : diff < 0 ? `<span class="arrow-tag is-down">↓ 降</span>` : '';
                return `
      <tr style="animation-delay:${i * 0.025}s">
        <td><span class="td-name">${name}</span></td>
        <td><span class="td-spec">${r.spec || '-'}</span></td>
        <td class="td-yp">${fmt(r.yp)}</td>
        <td class="td-tp ${cls}">${fmt(r.tp)}${tag}</td>
      </tr>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            searchTerm = e.target.value.trim();
            render();
        });

        document.getElementById('changeBtn').addEventListener('click', function () {
            onlyChanged = !onlyChanged;
            this.classList.toggle('active');
            render();
        });

        init();
    </script>
</body>

</html>
