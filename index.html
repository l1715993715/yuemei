<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>悦美 · 价格查询系统</title>
    <link rel="icon" href="logo" type="image/png">
    <meta property="og:title" content="悦美 · 价格查询系统">
    <meta property="og:description" content="医疗美容产品价格查询">
    <meta property="og:image" content="https://yuemei.store/logo">
    <meta property="og:url" content="https://yuemei.store/">
    <meta property="og:type" content="website">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --rose: #E8A0B0; --rose-deep: #C97A90; --rose-light: #FDF0F3;
            --rose-mid: #F5D5DC; --gold: #C9A96E; --text: #1A1020;
            --text-sub: #9A8A8E; --border: #EDE0E3; --bg: #FBF7F8;
            --card: #FFFFFF; --up: #D4756A; --down: #5A9E78;
            --sidebar-w: 88px; --header-h: 68px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,122,144,0.4); } 50% { box-shadow: 0 0 0 8px rgba(201,122,144,0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes floatBadge { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes qrZoomIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes logoPop { 0% { opacity: 0; transform: scale(0.6) translateY(10px); } 60% { transform: scale(1.12) translateY(-4px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes titleSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes wechatFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 0.85; transform: translateY(0); } }
        @keyframes rowIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .overlay { position: fixed; inset: 0; background: linear-gradient(160deg,#fff5f8 0%,#fdf0f3 50%,#fff8f0 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease; }
        .overlay.hide { opacity: 0; pointer-events: none; }
        .overlay-logo-wrap { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; box-shadow: 0 8px 32px rgba(201,122,144,0.28); margin-bottom: 22px; animation: logoPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both; border: 3px solid #fff; }
        .overlay-logo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .overlay-logo-emoji { font-size: 64px; margin-bottom: 22px; animation: logoPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both; display: none; }
        .overlay-title { font-size: 22px; font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg,var(--rose-deep) 0%,var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; animation: titleSlide 0.6s ease 0.3s both; }
        .overlay-sub { font-size: 11px; color: var(--text-sub); letter-spacing: 2.5px; margin-bottom: 36px; animation: titleSlide 0.6s ease 0.45s both; }
        .overlay-spinner-wrap { width: 48px; height: 48px; margin-bottom: 28px; animation: fadeIn 0.4s ease 0.5s both; }
        .spinner-ring { width: 48px; height: 48px; border: 3px solid var(--rose-mid); border-top-color: var(--rose-deep); border-radius: 50%; animation: spin 0.9s linear infinite; }
        .overlay-text { font-size: 14px; color: var(--rose-deep); font-weight: 600; letter-spacing: 2px; margin-bottom: 20px; animation: titleSlide 0.6s ease 0.55s both; }
        .overlay-wechat { display: flex; align-items: center; gap: 7px; background: #fff; border: 1.5px solid var(--rose-mid); border-radius: 24px; padding: 7px 16px 7px 8px; animation: wechatFade 0.6s ease 0.7s both; box-shadow: 0 4px 16px rgba(201,122,144,0.12); }
        .overlay-wechat img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--rose-mid); }
        .overlay-wechat-info { display: flex; flex-direction: column; line-height: 1.3; }
        .overlay-wechat-label { font-size: 9px; color: var(--text-sub); letter-spacing: 0.5px; }
        .overlay-wechat-id { font-size: 13px; font-weight: 800; color: var(--rose-deep); letter-spacing: 0.5px; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: linear-gradient(135deg,#fff8fa 0%,#fff 70%); border-bottom: 1px solid var(--rose-mid); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 200; box-shadow: 0 2px 24px rgba(201,122,144,0.10); animation: fadeIn 0.5s ease; }
        .header-logo { display: flex; align-items: center; gap: 12px; }
        .logo-emblem { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; box-shadow: 0 4px 16px rgba(201,122,144,0.38); animation: pulse 2.8s infinite; flex-shrink: 0; }
        .logo-emblem img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .logo-info { display: flex; flex-direction: column; }
        .logo-name { font-size: 17px; font-weight: 800; letter-spacing: 3px; background: linear-gradient(135deg,var(--rose-deep) 0%,var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2; }
        .logo-sub { font-size: 10px; color: var(--text-sub); letter-spacing: 1.5px; margin-top: 1px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .wechat-btn { position: relative; display: flex; align-items: center; gap: 7px; background: #fff; border: 1.5px solid var(--rose-mid); border-radius: 24px; padding: 5px 13px 5px 6px; cursor: pointer; transition: all 0.25s; text-decoration: none; }
        .wechat-btn:hover { border-color: var(--rose); box-shadow: 0 4px 14px rgba(201,122,144,0.2); transform: translateY(-1px); }
        .wechat-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; display: block; border: 1.5px solid var(--rose-mid); }
        .wechat-info { display: flex; flex-direction: column; line-height: 1.2; }
        .wechat-label { font-size: 9px; color: var(--text-sub); letter-spacing: 0.5px; }
        .wechat-id { font-size: 12px; font-weight: 700; color: var(--rose-deep); letter-spacing: 0.5px; }
        .wechat-popup { position: absolute; top: calc(100% + 10px); right: 0; background: #fff; border: 1px solid var(--rose-mid); border-radius: 16px; padding: 16px; box-shadow: 0 12px 40px rgba(201,122,144,0.22); display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 9000; white-space: nowrap; animation: fadeInUp 0.2s ease; min-width: 192px; }
        .wechat-popup.show { display: flex; }
        .wechat-popup .popup-qr { width: 160px; height: 160px; border-radius: 12px; object-fit: cover; border: 2px solid var(--rose-mid); cursor: zoom-in; transition: transform 0.2s; display: block; }
        .wechat-popup .popup-qr:hover { transform: scale(1.03); }
        .wechat-popup-text { font-size: 12px; color: var(--text-sub); text-align: center; }
        .wechat-popup-id { font-size: 14px; font-weight: 700; color: var(--rose-deep); }
        .qr-modal { position: fixed; inset: 0; background: rgba(26,16,32,0.72); display: flex; align-items: center; justify-content: center; z-index: 99999; animation: fadeIn 0.2s ease; }
        .qr-modal.hidden { display: none; }
        .qr-modal-inner { background: #fff; border-radius: 22px; padding: 28px 28px 22px; display: flex; flex-direction: column; align-items: center; gap: 14px; box-shadow: 0 20px 60px rgba(201,122,144,0.28); animation: qrZoomIn 0.25s ease; max-width: 90vw; }
        .qr-modal-img { width: min(320px,80vw); height: min(320px,80vw); border-radius: 16px; object-fit: cover; border: 3px solid var(--rose-mid); }
        .qr-modal-id { font-size: 18px; font-weight: 800; color: var(--rose-deep); letter-spacing: 1px; }
        .qr-modal-tip { font-size: 12px; color: var(--text-sub); }
        .qr-modal-close { margin-top: 4px; font-size: 13px; font-weight: 700; color: var(--rose-deep); background: var(--rose-light); border: 1.5px solid var(--rose-mid); padding: 8px 28px; border-radius: 24px; cursor: pointer; transition: all 0.2s; }
        .qr-modal-close:hover { background: var(--rose-mid); }
        .change-btn { font-size: 12px; font-weight: 700; color: var(--rose-deep); background: var(--rose-light); border: 1.5px solid var(--rose-mid); padding: 7px 15px; border-radius: 24px; cursor: pointer; transition: all 0.25s; white-space: nowrap; letter-spacing: 0.5px; }
        .change-btn:hover { background: var(--rose-mid); transform: translateY(-1px); }
        .change-btn.active { background: linear-gradient(135deg,var(--rose-deep),var(--gold)); color: #fff; border-color: transparent; box-shadow: 0 4px 16px rgba(201,122,144,0.42); }
        .layout { display: flex; padding-top: var(--header-h); height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: #fff; border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; padding: 12px 6px; display: flex; flex-direction: column; gap: 3px; scrollbar-width: none; animation: fadeIn 0.6s ease; }
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar-title { font-size: 10px; letter-spacing: 2px; color: var(--rose-deep); font-weight: 800; text-align: center; padding: 6px 0 12px; text-transform: uppercase; }
        .cat-btn { width: 100%; padding: 10px 5px; border: 1.5px solid transparent; border-radius: 12px; background: transparent; color: #6B5A60; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.22s; text-align: center; line-height: 1.4; word-break: break-all; animation: slideInLeft 0.4s ease both; }
        .cat-btn:hover { background: var(--rose-light); color: var(--rose-deep); border-color: var(--rose-mid); transform: translateX(2px); }
        .cat-btn.active { background: linear-gradient(135deg,var(--rose-deep),var(--gold)); color: #fff; font-weight: 800; border-color: transparent; box-shadow: 0 4px 14px rgba(201,122,144,0.38); animation: floatBadge 2s infinite; }
        .cat-count { display: block; font-size: 10px; margin-top: 3px; opacity: 0.85; font-weight: 700; }
        .cat-btn:not(.active) .cat-count { color: var(--rose-deep); }
        .main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 18px 14px; scrollbar-width: thin; scrollbar-color: var(--rose-mid) transparent; }
        .main-notice { text-align: center; font-size: 11px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 10px; animation: fadeInUp 0.5s ease both; }
        .main-notice span { background: var(--rose-light); border: 1px solid var(--rose-mid); border-radius: 20px; padding: 4px 14px; display: inline-block; }
        .search-wrap { position: relative; margin-bottom: 14px; animation: fadeInUp 0.5s ease 0.1s both; }
        .search-wrap svg { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--rose); pointer-events: none; }
        .search-input { width: 100%; padding: 13px 16px 13px 44px; border: 1.5px solid var(--border); border-radius: 50px; font-size: 14px; font-weight: 500; background: #fff; color: var(--text); transition: all 0.25s; outline: none; box-shadow: 0 2px 12px rgba(201,122,144,0.07); letter-spacing: 0.3px; }
        .search-input:focus { border-color: var(--rose); box-shadow: 0 0 0 4px rgba(232,160,176,0.16); }
        .search-input::placeholder { color: #d0c0c5; font-weight: 400; }
        .stats-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 0 4px; animation: fadeInUp 0.5s ease 0.2s both; }
        .stats-count { font-size: 13px; font-weight: 600; color: var(--text-sub); }
        .stats-count strong { color: var(--rose-deep); font-weight: 800; font-size: 15px; }
        .stats-pills { display: flex; gap: 8px; }
        .pill { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.5px; }
        .pill-up { background: #fdf0ee; color: var(--up); }
        .pill-down { background: #eef6f1; color: var(--down); }
        .card-list { display: flex; flex-direction: column; gap: 9px; }
        .price-card { background: var(--card); border-radius: 16px; padding: 15px 16px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; transition: all 0.22s; box-shadow: 0 2px 10px rgba(201,122,144,0.06); animation: fadeInUp 0.4s ease both; }
        .price-card:hover { border-color: var(--rose); box-shadow: 0 6px 20px rgba(201,122,144,0.14); transform: translateY(-2px); }
        .price-card:active { transform: scale(0.982); }
        .price-card.is-up { border-left: 3px solid var(--up); background: linear-gradient(to right,#fff8f7,#fff); }
        .price-card.is-down { border-left: 3px solid var(--down); background: linear-gradient(to right,#f3faf6,#fff); }
        .card-left { flex: 1; min-width: 0; }
        .card-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; letter-spacing: 0.4px; }
        .card-bottom-row { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
        .card-spec { font-size: 11px; color: var(--text-sub); background: var(--rose-light); display: inline-block; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.3px; white-space: nowrap; }
        .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; margin-left: 12px; flex-shrink: 0; }
        .price-today { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: 0.5px; }
        .price-today.is-up { color: var(--up); }
        .price-today.is-down { color: var(--down); }
        .price-old { font-size: 11px; color: #ccc; text-decoration: line-through; }
        .price-tag { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 6px; letter-spacing: 0.5px; }
        .price-tag.is-up { background: #fdf0ee; color: var(--up); }
        .price-tag.is-down { background: #eef6f1; color: var(--down); }
        .table-wrap { display: none; background: var(--card); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 28px rgba(201,122,144,0.09); animation: fadeInUp 0.5s ease 0.15s both; }
        .data-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .data-table thead tr { background: linear-gradient(135deg,#d4889a 0%,#c9a96e 100%); }
        .data-table th { padding: 16px 20px; text-align: left; font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 2px; }
        .data-table th:nth-child(1) { width: 36%; }
        .data-table th:nth-child(2) { width: 24%; }
        .data-table th:nth-child(3) { width: 20%; text-align: right; }
        .data-table th:nth-child(4) { width: 20%; text-align: right; }
        .data-table tbody tr { border-bottom: 1px solid var(--border); transition: all 0.18s; animation: rowIn 0.35s ease both; }
        .data-table tbody tr:last-child { border-bottom: none; }
        .data-table tbody tr:hover { background: var(--rose-light); transform: translateX(3px); }
        .data-table td { padding: 14px 20px; font-size: 14px; vertical-align: middle; }
        .data-table td:nth-child(3), .data-table td:nth-child(4) { text-align: right; }
        .td-name { font-weight: 700; color: var(--text); font-size: 14px; letter-spacing: 0.3px; }
        .td-spec { font-size: 11px; color: var(--text-sub); background: var(--rose-light); padding: 3px 10px; border-radius: 20px; display: inline-block; }
        .td-yp { color: #ccc; font-size: 13px; font-weight: 500; text-decoration: line-through; }
        .td-tp { font-weight: 800; font-size: 15px; color: var(--text); }
        .td-tp.is-up { color: var(--up); }
        .td-tp.is-down { color: var(--down); }
        .arrow-tag { font-size: 10px; padding: 2px 7px; border-radius: 5px; margin-left: 5px; font-weight: 800; letter-spacing: 0.5px; }
        .arrow-tag.is-up { background: #fdf0ee; color: var(--up); }
        .arrow-tag.is-down { background: #eef6f1; color: var(--down); }
        .origin-badge { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 6px; background: linear-gradient(135deg,#f5e6c8,#f0d4a8); color: #8a6020; border: 1px solid #e8c87a; letter-spacing: 0.3px; white-space: nowrap; flex-shrink: 0; display: inline-block; vertical-align: middle; }
        .empty { text-align: center; padding: 70px 20px; color: var(--text-sub); animation: fadeIn 0.4s ease; }
        .empty-icon { font-size: 46px; margin-bottom: 12px; }
        .empty-text { font-size: 15px; font-weight: 500; }
        .skeleton-list { display: flex; flex-direction: column; gap: 9px; }
        .skeleton-card { background: var(--card); border-radius: 16px; padding: 15px 16px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sk { background: linear-gradient(90deg,#f5edef 25%,#fdf5f6 50%,#f5edef 75%); background-size: 200% 100%; border-radius: 8px; animation: shimmer 1.6s infinite; }
        .sk-t { width: 55%; height: 14px; margin-bottom: 8px; }
        .sk-s { width: 32%; height: 11px; }
        .sk-p { width: 68px; height: 22px; }
        .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 11px 24px; border-radius: 24px; font-size: 13px; font-weight: 500; z-index: 99998; transition: transform 0.3s ease; white-space: nowrap; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        @media (min-width: 768px) {
            :root { --sidebar-w: 100px; --header-h: 72px; }
            .card-list { display: none; }
            .table-wrap { display: block; }
            .main { padding: 22px 28px; }
            .logo-name { font-size: 19px; }
        }
        @media (min-width: 1200px) {
            :root { --sidebar-w: 112px; }
            .main { padding: 28px 40px; }
        }
        @media (max-width: 420px) {
            :root { --sidebar-w: 72px; }
            .cat-btn { font-size: 10px; }
            .logo-name { font-size: 14px; letter-spacing: 1.5px; }
            .wechat-info { display: none; }
            .wechat-btn { padding: 5px 8px; }
            .overlay-title { font-size: 18px; letter-spacing: 2px; }
        }
    </style>
</head>

<body>
    <div class="toast" id="toast"></div>

    <div class="overlay" id="overlay">
        <div class="overlay-logo-wrap">
            <img src="logo" alt="悦美" onerror="this.parentElement.style.display='none';document.getElementById('overlayEmoji').style.display='block'">
        </div>
        <div class="overlay-logo-emoji" id="overlayEmoji">🌸</div>
        <div class="overlay-title">悦美价格查询系统</div>
        <div class="overlay-sub">Medical Beauty · Price System</div>
        <div class="overlay-spinner-wrap"><div class="spinner-ring"></div></div>
        <div class="overlay-text">正在加载价格数据…</div>
        <div class="overlay-wechat">
            <img src="https://q7.itc.cn/images01/20241021/b28b46002ea144f6965bb9b48af63227.jpeg" alt="微信">
            <div class="overlay-wechat-info">
                <span class="overlay-wechat-label">微信联系</span>
                <span class="overlay-wechat-id">yueomei</span>
            </div>
        </div>
    </div>

    <div class="qr-modal hidden" id="qrModal">
        <div class="qr-modal-inner">
            <img class="qr-modal-img" src="微信二维码" alt="微信二维码">
            <div class="qr-modal-id">yueomei</div>
            <div class="qr-modal-tip">长按或截图保存，扫码添加微信</div>
            <button class="qr-modal-close" id="qrModalClose">关 闭</button>
        </div>
    </div>

    <header class="header">
        <div class="header-logo">
            <div class="logo-emblem">
                <img src="logo" alt="悦美" onerror="this.parentElement.style.background='linear-gradient(145deg,#C97A90,#C9A96E)';this.style.display='none';this.parentElement.innerHTML='<span style=\'font-size:20px;display:flex;align-items:center;justify-content:center;height:100%\'>🌸</span>'">
            </div>
            <div class="logo-info">
                <span class="logo-name">悦美价格查询</span>
                <span class="logo-sub">Medical Beauty · Price System</span>
            </div>
        </div>
        <div class="header-right">
            <div class="wechat-btn" id="wechatBtn">
                <img class="wechat-avatar" src="https://q7.itc.cn/images01/20241021/b28b46002ea144f6965bb9b48af63227.jpeg" alt="微信">
                <div class="wechat-info">
                    <span class="wechat-label">微信联系</span>
                    <span class="wechat-id">yueomei</span>
                </div>
                <div class="wechat-popup" id="wechatPopup">
                    <img class="popup-qr" id="popupQr" src="微信二维码" alt="微信二维码">
                    <div class="wechat-popup-text">点击放大 / 搜索微信号</div>
                    <div class="wechat-popup-id">yueomei</div>
                </div>
            </div>
            <button class="change-btn" id="changeBtn">今日变动</button>
        </div>
    </header>

    <div class="layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-title">分类</div>
        </nav>
        <main class="main" id="main">
            <div class="main-notice">
                <span>价格表仅供参考，其中仅为部分产品，最终价格和其他产品以咨询为准，注意批文和国外版本的区别！</span>
            </div>
