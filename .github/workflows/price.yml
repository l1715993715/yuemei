name: 更新价格数据

on:
  schedule:
    - cron: '35 0 * * *'
    - cron: '10 1 * * *'
    - cron: '59 1 * * *'
    - cron: '30 21 * * *'
  workflow_dispatch:


permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 拉取价格数据
        run: |
          curl -s -X POST \
            "https://console.saas.aiwa.top/customer_frontend/flows/v1/workflows/run" \
            -H "Authorization: Bearer app-fiUbGF7hjVh7wh9fQewnFL88" \
            -H "Content-Type: application/json" \
            -d '{"inputs":{},"response_mode":"blocking","user":"youdiameiH5"}' \
            -o raw.json

      - name: 提取 content 字段存为 data.json
        run: |
          python3 - <<'EOF'
          import json
          with open('raw.json') as f:
              r = json.load(f)
          content = r['data']['outputs']['content']
          if isinstance(content, str):
              content = json.loads(content)
          result = []
          for item in content:
              if isinstance(item, str):
                  parsed = json.loads(item)
                  if isinstance(parsed, list):
                      result.extend(parsed)
                  else:
                      result.append(parsed)
              elif isinstance(item, list):
                  result.extend(item)
              else:
                  result.append(item)
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False)
          print(f"写入 {len(result)} 条数据")
          EOF

      - name: 提交更新
        run: |
          git config user.name "price-bot"
          git config user.email "bot@yuemei.store"
          git add data.json
          git diff --cached --quiet || git commit -m "🔄 自动更新价格数据 $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
